    - name: B10_perf
      id: b10_perf
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: B10_perf
        setup-command: ''
        command: timeout 4s bash ./scripts/test_suite.sh B10_perf
        timeout: 1
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        STRUCTURE_RESULTS: "${{steps.structure.outputs.result}}"
        BUILD_RESULTS: "${{steps.build.outputs.result}}"
        A1_RESULTS: "${{steps.a1.outputs.result}}"
        A2_RESULTS: "${{steps.a2.outputs.result}}"
        A3_RESULTS: "${{steps.a3.outputs.result}}"
        A4_RESULTS: "${{steps.a4.outputs.result}}"
        A5_RESULTS: "${{steps.a5.outputs.result}}"
        A6_RESULTS: "${{steps.a6.outputs.result}}"
        A7_RESULTS: "${{steps.a7.outputs.result}}"
