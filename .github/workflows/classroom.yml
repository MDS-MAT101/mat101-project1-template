        command: bash ./scripts/test_suite.sh A8
        timeout: 1
        max-score: 1
    - name: A9
      id: a9
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: A9
        setup-command: ''
        command: bash ./scripts/test_suite.sh A9
        timeout: 1
        max-score: 1
    - name: A10
      id: a10
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: A10
        setup-command: ''
        command: bash ./scripts/test_suite.sh A10
