        A9_RESULTS: "${{steps.a9.outputs.result}}"
        A10_RESULTS: "${{steps.a10.outputs.result}}"
        B1_RESULTS: "${{steps.b1.outputs.result}}"
        B2_RESULTS: "${{steps.b2.outputs.result}}"
        B3_RESULTS: "${{steps.b3.outputs.result}}"
        B4_RESULTS: "${{steps.b4.outputs.result}}"
        B5_RESULTS: "${{steps.b5.outputs.result}}"
        B6_RESULTS: "${{steps.b6.outputs.result}}"
        B7_RESULTS: "${{steps.b7.outputs.result}}"
        B8_RESULTS: "${{steps.b8.outputs.result}}"
        B9_RESULTS: "${{steps.b9.outputs.result}}"
        B10_RANGE_RESULTS: "${{steps.b10_range.outputs.result}}"
        B10_PRIME_RESULTS: "${{steps.b10_prime.outputs.result}}"
        B10_PERF_RESULTS: "${{steps.b10_perf.outputs.result}}"
      with:
        runners: structure,build,a1,a2,a3,a4,a5,a6,a7,a8,a9,a10,b1,b2,b3,b4,b5,b6,b7,b8,b9,b10_range,b10_prime,b10_perf
