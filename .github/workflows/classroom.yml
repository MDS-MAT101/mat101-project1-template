      with:
        test-name: A5
        setup-command: ''
        command: bash ./scripts/test_suite.sh A5
        timeout: 1
        max-score: 1
    - name: A6
      id: a6
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: A6
        setup-command: ''
        command: bash ./scripts/test_suite.sh A6
