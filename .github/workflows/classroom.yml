name: Autograding Tests
'on':
- workflow_dispatch
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: structure
      id: structure
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: structure
        setup-command: ''
        command: bash ./scripts/check_structure.sh
        timeout: 1
        max-score: 1
    - name: build
      id: build
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: build
        setup-command: ''
        command: bash ./scripts/build.sh
        timeout: 1
        max-score: 1
    - name: A1
      id: a1
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: A1
        setup-command: ''
        command: bash ./scripts/test_suite.sh A1
        timeout: 1
        max-score: 1
    - name: A2
      id: a2
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: A2
        setup-command: ''
        command: bash ./scripts/test_suite.sh A2
        timeout: 1
        max-score: 1
    - name: A3
      id: a3
      uses: classroom-resources/autograding-command-grader@v1
